<!DOCTYPE html>
<html lang="en-GB" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="description" content="The giant wheel of gains, the small wheel of what you keep. A UK CGT-aware investment tracker." />

  <title>Penny Farthing</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="icons/icon-192.png" type="image/png" />

  <!-- Fonts: Inter Tight for display, Inter for body, JetBrains Mono for figures -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/print.css" />
</head>
<body>
  <div class="page-grain" aria-hidden="true"></div>

  <header class="masthead">
    <div class="masthead__inner">
      <div class="masthead__title">
        <span class="masthead__ornament" aria-hidden="true"></span>
        <h1>Penny Farthing</h1>
      </div>
      <div class="masthead__actions">
        <button id="privacy-toggle" class="masthead-icon-btn" type="button"
                aria-label="Toggle privacy mode" aria-pressed="false"
                title="Hide values">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <path class="privacy-eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle class="privacy-eye-open" cx="12" cy="12" r="3"/>
            <path class="privacy-eye-closed" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line class="privacy-eye-closed" x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
          <span class="theme-toggle__icon" aria-hidden="true">☾</span>
        </button>
      </div>
    </div>
    <div class="masthead__rule" aria-hidden="true"></div>
  </header>

  <div id="banner-zone" class="banner-zone"></div>

  <main id="app" class="app-main" role="main">
    <!-- Views render here -->
    <section class="loading">
      <p>Loading…</p>
    </section>
  </main>

  <nav class="dock" role="navigation" aria-label="Primary">
    <a href="#/dashboard" class="dock__item" data-view="dashboard">
      <span class="dock__icon" aria-hidden="true">◈</span>
      <span class="dock__label">Dashboard</span>
    </a>
    <a href="#/holdings" class="dock__item" data-view="holdings">
      <span class="dock__icon" aria-hidden="true">▦</span>
      <span class="dock__label">Holdings</span>
    </a>
    <a href="#/add" class="dock__item dock__item--accent" data-view="add">
      <span class="dock__icon" aria-hidden="true">+</span>
      <span class="dock__label">Record</span>
    </a>
    <a href="#/transactions" class="dock__item" data-view="transactions">
      <span class="dock__icon" aria-hidden="true">≡</span>
      <span class="dock__label">Activity</span>
    </a>
    <a href="#/settings" class="dock__item" data-view="settings">
      <span class="dock__icon" aria-hidden="true">⚙</span>
      <span class="dock__label">Settings</span>
    </a>
  </nav>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
